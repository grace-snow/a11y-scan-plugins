name: A11y issue screenshots

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: write
  issues: write

jobs:
  capture_accessibility_issue_screenshot:
    if: contains(github.event.issue.title, 'A11y:')
    runs-on: ubuntu-latest
    env:
      SCREENSHOT_BRANCH: issue-screenshots
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture issue-specific screenshot
        id: capture
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/scripts/capture-accessibility-issue-screenshot.mjs

      - name: Publish screenshot to branch
        if: steps.capture.outputs.should_capture == 'true'
        id: publish
        uses: actions/github-script@v7
        env:
          SCREENSHOT_BRANCH: ${{ env.SCREENSHOT_BRANCH }}
          SCREENSHOT_LOCAL_PATH: ${{ steps.capture.outputs.screenshot_local_path }}
          SCREENSHOT_RELATIVE_PATH: ${{ steps.capture.outputs.screenshot_relative_path }}
        with:
          script: |
            const fs = require('node:fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.SCREENSHOT_BRANCH;
            const localPath = process.env.SCREENSHOT_LOCAL_PATH;
            const relativePath = process.env.SCREENSHOT_RELATIVE_PATH;

            let branchExists = true;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch (error) {
              if (error.status === 404) {
                branchExists = false;
              } else {
                throw error;
              }
            }

            if (!branchExists) {
              const { data: repoData } = await github.rest.repos.get({ owner, repo });
              const { data: baseRef } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${repoData.default_branch}`,
              });

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseRef.object.sha,
              });
            }

            let existingSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path: relativePath,
                ref: branch,
              });
              existingSha = data.sha;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const contentBase64 = fs.readFileSync(localPath, { encoding: 'base64' });

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: relativePath,
              branch,
              message: `Update screenshot for issue #${context.payload.issue.number}`,
              content: contentBase64,
              sha: existingSha,
            });

            const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${relativePath}`;
            core.setOutput('image_url', imageUrl);

      - name: Upsert issue comment with screenshot
        if: steps.capture.outputs.should_capture == 'true'
        uses: actions/github-script@v7
        env:
          IMAGE_URL: ${{ steps.publish.outputs.image_url }}
          PAGE_URL: ${{ steps.capture.outputs.page_url }}
          SCREENSHOT_KIND: ${{ steps.capture.outputs.screenshot_kind }}
          SELECTOR_USED: ${{ steps.capture.outputs.selector_used }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const marker = '<!-- accessibility-issue-screenshot -->';

            const descriptor = process.env.SCREENSHOT_KIND === 'element'
              ? `Targeted screenshot for this finding on ${process.env.PAGE_URL}${process.env.SELECTOR_USED ? ` (selector: ${process.env.SELECTOR_USED})` : ''}:`
              : `Page screenshot for this finding on ${process.env.PAGE_URL}:`;

            const body = [
              marker,
              descriptor,
              '',
              `![Accessibility finding screenshot](${process.env.IMAGE_URL})`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
