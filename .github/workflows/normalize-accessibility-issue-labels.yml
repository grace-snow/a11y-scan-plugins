name: Normalize a11y issue labels

on:
  issues:
    types:
      - opened
      - reopened
      - edited
      - labeled

permissions:
  issues: write

jobs:
  normalize_labels:
    if: startsWith(github.event.issue.title, 'Accessibility issue:')
    runs-on: ubuntu-latest
    steps:
      - name: Normalize scanner labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const issue = context.payload.issue;

            const currentLabels = (issue.labels || []).map((l) => l.name);
            const keep = new Set(currentLabels);
            const remove = new Set();
            const add = new Set(["a11y"]);

            const body = issue.body || "";
            const title = issue.title || "";

            // 1) Remove noisy scanner-state labels.
            for (const name of currentLabels) {
              if (/^[a-z0-9-]+-scan-scanning-issue$/i.test(name)) {
                remove.add(name);
              }
            }

            // 2) Transform verbose scanner rule labels into clean rule labels.
            // Example: banner-scan rule: primer_banner-landmark-role -> rule: primer_banner-landmark-role
            let scannerType = null;
            for (const name of currentLabels) {
              const match = name.match(/^([a-z0-9-]+)-scan\s+rule:\s+(.+)$/i);
              if (match) {
                scannerType = match[1].toLowerCase();
                const ruleId = match[2].trim();
                add.add(`rule: ${ruleId}`);
                remove.add(name);
              }
            }

            if (scannerType) {
              // Map scanner type to clean label
              const scannerLabel = scannerType.replace(/-scan$/, '');
              add.add(`scan: ${scannerLabel}`);
            }

            // 3) Add WCAG-{criterion} labels from issue text when present.
            const wcagMatches = Array.from(body.matchAll(/\b([1-4]\.\d\.\d{1,2})\b/g));
            for (const m of wcagMatches) {
              add.add(`WCAG-${m[1]}`);
            }

            // 4) Add WCAG conformance level labels based on criteria
            // Map WCAG criteria to their levels
            const wcagLevels = {
              // Level A
              '1.1.1': 'A', '1.2.1': 'A', '1.2.2': 'A', '1.2.3': 'A', '1.3.1': 'A', '1.3.2': 'A', '1.3.3': 'A',
              '1.4.1': 'A', '1.4.2': 'A', '2.1.1': 'A', '2.1.2': 'A', '2.1.4': 'A', '2.2.1': 'A', '2.2.2': 'A',
              '2.3.1': 'A', '2.4.1': 'A', '2.4.2': 'A', '2.4.3': 'A', '2.4.4': 'A', '2.5.1': 'A', '2.5.2': 'A',
              '2.5.3': 'A', '2.5.4': 'A', '3.1.1': 'A', '3.2.1': 'A', '3.2.2': 'A', '3.3.1': 'A', '3.3.2': 'A',
              '4.1.1': 'A', '4.1.2': 'A',
              // Level AA
              '1.2.4': 'AA', '1.2.5': 'AA', '1.3.4': 'AA', '1.3.5': 'AA', '1.4.3': 'AA', '1.4.4': 'AA',
              '1.4.5': 'AA', '1.4.10': 'AA', '1.4.11': 'AA', '1.4.12': 'AA', '1.4.13': 'AA', '2.4.5': 'AA',
              '2.4.6': 'AA', '2.4.7': 'AA', '2.4.11': 'AA', '2.5.7': 'AA', '2.5.8': 'AA', '3.1.2': 'AA',
              '3.2.3': 'AA', '3.2.4': 'AA', '3.2.6': 'AA', '3.3.3': 'AA', '3.3.4': 'AA', '3.3.7': 'AA',
              '4.1.3': 'AA'
            };

            const levelsFound = new Set();
            for (const m of wcagMatches) {
              const criterion = m[1];
              const level = wcagLevels[criterion];
              if (level) {
                levelsFound.add(level);
              }
            }

            for (const level of levelsFound) {
              add.add(`WCAG-${level}`);
            }

            // 5) Add a11y-primer for component/Primer requirements.
            if (/Primer accessibility requirement/i.test(body) || /\bbanner-scan\b|\bnav-list-scan\b/i.test(body)) {
              add.add("a11y-primer");
            }

            // Build target label set while preserving unrelated labels.
            for (const label of remove) {
              keep.delete(label);
            }
            for (const label of add) {
              keep.add(label);
            }

            const targetLabels = Array.from(keep);

            // If no changes, skip API update.
            const sameLength = targetLabels.length === currentLabels.length;
            const sameSet = sameLength && currentLabels.every((name) => keep.has(name));
            if (sameSet) {
              core.info("Labels already normalized; nothing to change.");
              return;
            }

            // Ensure any new labels exist in the repository before setting labels.
            async function ensureLabelExists(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: "0e8a16",
                  description: "Auto-generated accessibility scan label",
                });
              }
            }

            const newlyAdded = Array.from(add).filter((name) => !currentLabels.includes(name));
            for (const name of newlyAdded) {
              await ensureLabelExists(name);
            }

            await github.rest.issues.setLabels({
              owner,
              repo,
              issue_number,
              labels: targetLabels,
            });

            core.info(`Updated labels for issue #${issue_number}`);
