name: Cleanup Issue Screenshots

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      SCREENSHOT_BRANCH: issue-screenshots
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean screenshots for old closed issues
        run: |
          set -euo pipefail

          if ! git ls-remote --exit-code --heads origin "$SCREENSHOT_BRANCH" >/dev/null; then
            echo "Screenshot branch does not exist yet; nothing to clean."
            exit 0
          fi

          git fetch origin "$SCREENSHOT_BRANCH":"$SCREENSHOT_BRANCH"
          git checkout "$SCREENSHOT_BRANCH"

          if [ ! -d "screenshots" ]; then
            echo "No screenshots directory found; nothing to clean."
            exit 0
          fi

          changed=0
          now_epoch="$(date -u +%s)"
          retention_days=90
          retention_seconds=$((retention_days * 24 * 60 * 60))
          for issue_dir in screenshots/*; do
            [ -d "$issue_dir" ] || continue
            issue_number="$(basename "$issue_dir")"

            if ! [[ "$issue_number" =~ ^[0-9]+$ ]]; then
              continue
            fi

            issue_json="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${issue_number}" 2>/dev/null || echo '{}')"
            state="$(printf '%s' "$issue_json" | jq -r '.state // "missing"')"
            closed_at="$(printf '%s' "$issue_json" | jq -r '.closed_at // empty')"

            if [ "$state" = "closed" ] && [ -n "$closed_at" ]; then
              closed_epoch="$(date -u -d "$closed_at" +%s 2>/dev/null || echo 0)"
              age_seconds=$((now_epoch - closed_epoch))

              if [ "$closed_epoch" -gt 0 ] && [ "$age_seconds" -ge "$retention_seconds" ]; then
                age_days=$((age_seconds / 86400))
                echo "Removing screenshots for issue #${issue_number} (closed ${age_days} days ago)"
                rm -rf "$issue_dir"
                changed=1
              fi
            fi
          done

          find screenshots -type d -empty -delete || true

          if [ "$changed" -eq 0 ]; then
            echo "No screenshots eligible for cleanup (closed for 90+ days)."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add screenshots

          if git diff --cached --quiet; then
            echo "No staged cleanup changes."
            exit 0
          fi

          git commit -m "Cleanup screenshots for issues closed 90+ days"
          git push origin "$SCREENSHOT_BRANCH"
